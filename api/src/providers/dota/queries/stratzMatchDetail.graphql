query PulseboardStratzMatchDetail($id: Long!) {
  liveMatch: live {
    match(id: $id) {
      matchId
      radiantScore
      direScore
      leagueId
      league {
        id
        name
        displayName
        tier
        streams {
          id
          name
          streamUrl
        }
      }
      delay
      spectators
      buildingState
      radiantLead
      gameTime
      completed
      isUpdating
      isParsing
      radiantTeamId
      direTeamId
      radiantTeam {
        id
        name
        tag
        logo
      }
      direTeam {
        id
        name
        tag
        logo
      }
      gameState
      gameMinute
      createdDateTime
      modifiedDateTime
      insight {
        teamOneVsWinCount
        teamTwoVsWinCount
        teamOneLeagueWinCount
        teamOneLeagueMatchCount
        teamTwoLeagueWinCount
        teamTwoLeagueMatchCount
      }
      liveWinRateValues {
        time
        winRate
      }
      players {
        matchId
        heroId
        hero {
          id
          name
          displayName
          shortName
        }
        name
        playerSlot
        steamAccountId
        steamAccount {
          id
          name
          realName
          avatar
        }
        isRadiant
        numKills
        numDeaths
        numAssists
        numLastHits
        numDenies
        goldPerMinute
        experiencePerMinute
        level
        gold
        goldSpent
        heroDamage
        towerDamage
        itemId0
        itemId1
        itemId2
        itemId3
        itemId4
        itemId5
        backpackId0
        backpackId1
        backpackId2
        networth
        respawnTimer
        position
        playbackData {
          positionEvents {
            time
            x
            y
          }
          goldEvents {
            time
            gold
            networth
            networthDifference
            goldPerMinute
          }
          killEvents {
            time
            positionX
            positionY
          }
          deathEvents {
            time
            positionX
            positionY
          }
          assistEvents {
            time
            positionX
            positionY
          }
          csEvents {
            time
            positionX
            positionY
          }
          denyEvents {
            time
            positionX
            positionY
          }
          inventoryEvents {
            time
            itemId0
            itemId1
            itemId2
            itemId3
            itemId4
            itemId5
            backpackId0
            backpackId1
            backpackId2
          }
        }
      }
      playbackData {
        roshanEvents {
          time
          isAlive
          respawnTimer
        }
        buildingEvents {
          time
          indexId
          type
          isAlive
          positionX
          positionY
          isRadiant
          npcId
        }
        pickBans {
          isPick
          heroId
          order
          bannedHeroId
          isRadiant
          baseWinRate
          adjustedWinRate
          letter
          position
        }
        radiantScore {
          time
          score
        }
        direScore {
          time
          score
        }
      }
    }
  }
  completedMatch: match(id: $id) {
    id
    didRadiantWin
    durationSeconds
    startDateTime
    endDateTime
    towerStatusRadiant
    towerStatusDire
    barracksStatusRadiant
    barracksStatusDire
    firstBloodTime
    leagueId
    league {
      id
      name
      displayName
      tier
      streams {
        id
        name
        streamUrl
      }
    }
    radiantTeamId
    radiantTeam {
      id
      name
      tag
      logo
    }
    direTeamId
    direTeam {
      id
      name
      tag
      logo
    }
    seriesId
    players {
      heroId
      hero {
        id
        name
        displayName
        shortName
      }
      steamAccount {
        id
        name
        realName
        avatar
      }
      isRadiant
      kills
      deaths
      assists
      numLastHits
      numDenies
      goldPerMinute
      experiencePerMinute
      level
      networth
      position
      item0Id
      item1Id
      item2Id
      item3Id
      item4Id
      item5Id
      backpack0Id
      backpack1Id
      backpack2Id
    }
    radiantNetworthLeads
    radiantKills
    direKills
    pickBans {
      isPick
      heroId
      order
      bannedHeroId
      isRadiant
    }
  }
}
