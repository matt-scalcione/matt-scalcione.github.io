services:
  - type: web
    name: pulseboard-api
    runtime: node
    plan: free
    rootDir: api
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: ESPORTS_DATA_MODE
        value: hybrid
      - key: PROVIDER_CACHE_MS
        value: 30000
      - key: PROVIDER_TIMEOUT_MS
        value: 15000
      - key: CANONICAL_STORE_RETENTION_DAYS
        value: 3
      - key: CANONICAL_STORE_SNAPSHOT_HISTORY_ENABLED
        value: 0
      - key: CANONICAL_STORE_COMPACT_ON_INIT
        value: 1
      - key: CANONICAL_PREWARM_MATCH_LIMIT
        value: 2
      - key: CANONICAL_PREWARM_TEAM_LIMIT
        value: 2
      - key: LIQUIPEDIA_DOTA_API_CACHE_MS
        value: 30000
      - key: PULSEBOARD_PUBLIC_BASE
        value: https://matt-scalcione.github.io
      - key: STRATZ_API_TOKEN
        sync: false
