<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulseboard Live Desk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <header class="hero">
      <p class="kicker">Pulseboard</p>
      <h1>Live Esports Desk</h1>
      <p class="subtitle">
        League of Legends and Dota 2 live scores with instant context, not just raw events.
      </p>
      <nav class="page-nav">
        <a id="liveDeskNav" href="./index.html" aria-current="page">Live Desk</a>
        <a id="scheduleNav" href="./schedule.html">Schedule & Results</a>
        <a id="followsNav" href="./follows.html">Follows & Alerts</a>
      </nav>
    </header>

    <main class="layout">
      <section class="panel controls">
        <h2>Filters</h2>
        <div class="controls-grid">
          <label class="api-base-field">
            API Base
            <input id="apiBaseInput" type="text" placeholder="http://localhost:4000" />
          </label>
          <label>
            Game
            <select id="gameSelect">
              <option value="">All</option>
              <option value="lol">League of Legends</option>
              <option value="dota2">Dota 2</option>
            </select>
          </label>
          <label>
            Region
            <input id="regionInput" type="text" placeholder="na, eu, kr..." />
          </label>
          <label>
            Dota Tiers
            <input id="dotaTiersInput" type="text" placeholder="1,2,3,4" value="1,2,3,4" />
          </label>
          <label>
            User ID
            <input id="userIdInput" type="text" placeholder="demo-user" />
          </label>
          <label class="check">
            <input id="followedOnlyInput" type="checkbox" />
            Followed teams only
          </label>
        </div>

        <div class="actions">
          <button id="refreshButton" type="button">Refresh Now</button>
          <button id="saveButton" type="button" class="ghost api-base-save">Save API Base</button>
          <p id="statusText" class="status-text">Ready.</p>
        </div>
      </section>

      <section class="panel live-desk">
        <div class="section-head">
          <h2>Live and Upcoming</h2>
          <p id="metaText" class="meta-text">Waiting for data...</p>
        </div>
        <div id="cardGrid" class="card-grid"></div>
      </section>
    </main>

    <script src="./site-config.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
