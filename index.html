<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulseboard Live Desk</title>
    <meta
      name="description"
      content="Live League of Legends and Dota 2 scores with current series state, map context, and fast match detail on Pulseboard."
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://matt-scalcione.github.io/index.html" />
    <meta property="og:site_name" content="Pulseboard" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pulseboard Live Desk" />
    <meta
      property="og:description"
      content="Live League of Legends and Dota 2 scores with current series state, map context, and fast match detail."
    />
    <meta property="og:url" content="https://matt-scalcione.github.io/index.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pulseboard Live Desk" />
    <meta
      name="twitter:description"
      content="Live League of Legends and Dota 2 scores with current series state, map context, and fast match detail."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260307i" />
  </head>
  <body class="live-page">
    <div class="noise"></div>
    <header class="hero">
      <h1>Live Esports Desk</h1>
      <p class="subtitle">
        League of Legends and Dota 2 live scores with instant context, not just raw events.
      </p>
      <nav class="page-nav">
        <a id="liveDeskNav" href="./index.html" aria-current="page">Live Desk</a>
        <a id="scheduleNav" href="./schedule.html">Schedule & Results</a>
        <a id="followsNav" href="./follows.html">Follows & Alerts</a>
        <a id="lolHubNav" href="./lol.html">LoL Hub</a>
        <a id="dotaHubNav" href="./dota2.html">Dota Hub</a>
      </nav>
    </header>

    <main class="layout">
      <section class="panel controls" id="controlsPanel">
        <div class="controls-head">
          <h2>Filters</h2>
          <button id="controlsToggle" type="button" class="ghost controls-toggle" aria-expanded="true" aria-controls="controlsBody">Hide Filters</button>
        </div>
        <div class="controls-body" id="controlsBody">
          <div class="controls-grid">
            <label class="api-base-field">
              API Base
              <input id="apiBaseInput" type="text" placeholder="http://localhost:4000" />
            </label>
            <label>
              Game
              <select id="gameSelect">
                <option value="">All</option>
                <option value="lol">League of Legends</option>
                <option value="dota2">Dota 2</option>
              </select>
            </label>
            <label>
              Region
              <input id="regionInput" type="text" placeholder="na, eu, kr..." />
            </label>
            <label>
              Dota Tiers
              <input id="dotaTiersInput" type="text" placeholder="1,2,3,4" value="1,2,3,4" />
            </label>
            <label>
              User ID
              <input id="userIdInput" type="text" placeholder="demo-user" />
            </label>
            <label class="check">
              <input id="followedOnlyInput" type="checkbox" />
              Followed teams only
            </label>
          </div>

          <div class="actions">
            <button id="refreshButton" type="button">Refresh Now</button>
            <button id="saveButton" type="button" class="ghost api-base-save">Save API Base</button>
            <p id="statusText" class="status-text" aria-live="polite">Ready.</p>
          </div>
        </div>
      </section>

      <section class="panel live-desk">
        <div class="section-head">
          <h2>Live and Upcoming</h2>
          <p id="metaText" class="meta-text" aria-live="polite">Waiting for data...</p>
        </div>
        <div class="live-tools">
          <div id="liveStatusSwitch" class="live-status-switch" aria-label="Live desk quick filter">
            <button type="button" class="live-status-btn" data-status="all" aria-pressed="true">All</button>
            <button type="button" class="live-status-btn" data-status="live" aria-pressed="false">Live</button>
            <button type="button" class="live-status-btn" data-status="upcoming" aria-pressed="false">Next</button>
            <button type="button" class="live-status-btn" data-status="completed" aria-pressed="false">Final</button>
          </div>
          <label class="live-search-field">
            Search
            <input
              id="liveSearchInput"
              type="search"
              inputmode="search"
              autocapitalize="off"
              autocomplete="off"
              spellcheck="false"
              placeholder="team or tournament"
            />
          </label>
          <button id="liveResetFiltersButton" type="button" class="ghost live-reset-btn">Clear</button>
        </div>
        <p id="liveFilterMeta" class="meta-text"></p>
        <div id="cardGrid" class="card-grid"></div>
      </section>
    </main>
    <nav class="mobile-tabbar" aria-label="Primary">
      <a id="mobileLiveNav" class="mobile-tab" href="./index.html" aria-current="page">
        <span class="mobile-tab-icon">L</span>
        <span>Live</span>
      </a>
      <a id="mobileScheduleNav" class="mobile-tab" href="./schedule.html">
        <span class="mobile-tab-icon">S</span>
        <span>Schedule</span>
      </a>
      <a id="mobileFollowsNav" class="mobile-tab" href="./follows.html">
        <span class="mobile-tab-icon">F</span>
        <span>Follows</span>
      </a>
    </nav>

    <script src="./site-config.js?v=20260307i"></script>
    <script type="module" src="./main.js?v=20260307i"></script>
  </body>
</html>
