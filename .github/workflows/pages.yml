name: Deploy Pulseboard to Pages
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}
  schedule:
    - cron: "*/15 * * * *"
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Generate Dota schedule snapshot
        run: node scripts/generate-dota-schedule-snapshot.mjs
        env:
          PULSEBOARD_DOTA_SCHEDULE_SNAPSHOT_URL: ""
          PULSEBOARD_PUBLIC_BASE: https://matt-scalcione.github.io
      - name: Generate sitemap from live API data
        run: node scripts/generate-sitemap.mjs
        env:
          PULSEBOARD_API_BASE: https://pulseboard-api-drq0.onrender.com
          PULSEBOARD_SITE_ORIGIN: https://matt-scalcione.github.io
          PULSEBOARD_INDEX_DETAIL_PAGES: "false"
      - name: Validate SEO metadata and sitemap
        run: node scripts/seo-check.mjs
        env:
          PULSEBOARD_SITE_ORIGIN: https://matt-scalcione.github.io
          PULSEBOARD_INDEX_DETAIL_PAGES: "false"
      - name: Build Pages artifact
        run: node scripts/build-pages-artifact.mjs
      - uses: actions/upload-pages-artifact@v3
        with: { path: dist-pages }
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
