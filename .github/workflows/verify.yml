name: Verify
on: { pull_request: {} }
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - name: Validate JavaScript syntax
        run: |
          find . -name '*.js' \
            -not -path './.git/*' \
            -not -path './api/node_modules/*' \
            -print0 | xargs -0 -n1 node --check
