name: Deploy API to Render

on:
  push:
    branches: [ main ]
    paths:
      - "api/**"
      - "render.yaml"
      - ".github/workflows/deploy-api-render.yml"
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          if [ -z "$RENDER_API_KEY" ] || [ -z "$RENDER_SERVICE_ID" ]; then
            echo "::error::Missing required secrets: RENDER_API_KEY and/or RENDER_SERVICE_ID"
            exit 1
          fi

          curl --fail --show-error --silent \
            --request POST \
            --url "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            --header "accept: application/json" \
            --header "authorization: Bearer ${RENDER_API_KEY}" \
            --header "content-type: application/json" \
            --data '{}' \
            > /tmp/render-deploy.json

          echo "Render deploy triggered:"
          cat /tmp/render-deploy.json
