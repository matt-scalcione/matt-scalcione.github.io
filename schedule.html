<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulseboard Schedule & Results</title>
    <meta
      name="description"
      content="Upcoming schedule and final results for League of Legends and Dota 2 with quick access to series and game detail."
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://matt-scalcione.github.io/schedule.html" />
    <meta property="og:site_name" content="Pulseboard" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pulseboard Schedule & Results" />
    <meta
      property="og:description"
      content="Upcoming schedule and final results for League of Legends and Dota 2 with quick series access."
    />
    <meta property="og:url" content="https://matt-scalcione.github.io/schedule.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pulseboard Schedule & Results" />
    <meta
      name="twitter:description"
      content="Upcoming schedule and final results for League of Legends and Dota 2 with quick series access."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260307p" />
  </head>
  <body class="schedule-page">
    <div class="noise"></div>
    <header class="hero">
      <h1>Schedule & Results</h1>
      <p class="subtitle">
        Track upcoming series and final results across LoL and Dota 2.
      </p>
      <nav class="page-nav">
        <a id="liveDeskNav" href="./index.html">Live Desk</a>
        <a id="scheduleNav" href="./schedule.html" aria-current="page">Schedule & Results</a>
        <a id="followsNav" href="./follows.html">Follows & Alerts</a>
        <a id="lolHubNav" href="./lol.html">LoL Hub</a>
        <a id="dotaHubNav" href="./dota2.html">Dota Hub</a>
      </nav>
    </header>

    <main class="layout">
      <section class="panel controls" id="controlsPanel">
        <div class="controls-head">
          <h2>Filters</h2>
          <button
            id="controlsToggle"
            type="button"
            class="ghost controls-toggle"
            aria-expanded="true"
            aria-controls="controlsBody"
          >
            Hide Filters
          </button>
        </div>
        <div class="controls-body" id="controlsBody">
          <div id="scheduleRangePresets" class="schedule-range-row" role="group" aria-label="Quick date ranges">
            <button type="button" class="schedule-range-chip" data-range="live">Live</button>
            <button type="button" class="schedule-range-chip" data-range="24h">24h</button>
            <button type="button" class="schedule-range-chip" data-range="3d">3d</button>
            <button type="button" class="schedule-range-chip" data-range="7d">7d</button>
          </div>
          <div class="controls-grid">
            <label class="api-base-field">
              API Base
              <input id="apiBaseInput" type="text" placeholder="http://localhost:4000" />
            </label>
            <label>
              Game
              <select id="gameSelect">
                <option value="">All</option>
                <option value="lol">League of Legends</option>
                <option value="dota2">Dota 2</option>
              </select>
            </label>
            <label class="region-field">
              Region
              <input id="regionInput" type="text" placeholder="na, eu, kr..." />
            </label>
            <label class="schedule-dota-only">
              Dota Tiers
              <input id="dotaTiersInput" type="text" placeholder="1,2,3,4" value="1,2,3,4" />
            </label>
            <label>
              From
              <input id="dateFromInput" type="datetime-local" />
            </label>
            <label>
              To
              <input id="dateToInput" type="datetime-local" />
            </label>
          </div>

          <div class="actions">
            <button id="refreshButton" type="button">Refresh</button>
            <button id="saveButton" type="button" class="ghost api-base-save">Save API Base</button>
            <p id="statusText" class="status-text" aria-live="polite">Ready.</p>
          </div>
        </div>
      </section>

      <section class="panel">
        <div id="scheduleViewSwitch" class="mobile-segment" aria-label="Schedule view">
          <button type="button" class="mobile-segment-btn" data-view="both" aria-pressed="true">Both</button>
          <button type="button" class="mobile-segment-btn" data-view="schedule" aria-pressed="false">Schedule</button>
          <button type="button" class="mobile-segment-btn" data-view="results" aria-pressed="false">Results</button>
        </div>

        <div id="scheduleSection">
          <div class="section-head">
            <h2>Schedule</h2>
            <p id="scheduleMeta" class="meta-text" aria-live="polite">Waiting for data...</p>
          </div>
          <div id="scheduleTableWrap" class="table-wrap"></div>
        </div>

        <div id="resultsSection" class="top-space">
          <div class="section-head">
            <h2>Results</h2>
            <p id="resultsMeta" class="meta-text" aria-live="polite">Waiting for data...</p>
          </div>
          <div id="resultsTableWrap" class="table-wrap"></div>
        </div>
      </section>
    </main>

    <nav class="mobile-tabbar" aria-label="Primary">
      <a id="mobileLiveNav" class="mobile-tab" href="./index.html">
        <span class="mobile-tab-icon">L</span>
        <span>Live</span>
      </a>
      <a id="mobileScheduleNav" class="mobile-tab" href="./schedule.html" aria-current="page">
        <span class="mobile-tab-icon">S</span>
        <span>Schedule</span>
      </a>
      <a id="mobileFollowsNav" class="mobile-tab" href="./follows.html">
        <span class="mobile-tab-icon">F</span>
        <span>Follows</span>
      </a>
    </nav>

    <script src="./site-config.js?v=20260307p"></script>
    <script type="module" src="./schedule.js?v=20260307p"></script>
  </body>
</html>
