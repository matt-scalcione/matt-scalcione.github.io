<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulseboard Schedule & Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <header class="hero">
      <p class="kicker">Pulseboard</p>
      <h1>Schedule & Results</h1>
      <p class="subtitle">
        Filter by game, region, and date range to track upcoming matches and completed series.
      </p>
      <nav class="page-nav">
        <a id="liveDeskNav" href="./index.html">Live Desk</a>
        <a id="scheduleNav" href="./schedule.html" aria-current="page">Schedule & Results</a>
        <a id="followsNav" href="./follows.html">Follows & Alerts</a>
      </nav>
    </header>

    <main class="layout">
      <section class="panel controls">
        <h2>Filters</h2>
        <div class="controls-grid">
          <label>
            API Base
            <input id="apiBaseInput" type="text" placeholder="http://localhost:4000" />
          </label>
          <label>
            Game
            <select id="gameSelect">
              <option value="">All</option>
              <option value="lol">League of Legends</option>
              <option value="dota2">Dota 2</option>
            </select>
          </label>
          <label>
            Region
            <input id="regionInput" type="text" placeholder="na, eu, kr..." />
          </label>
          <label>
            Dota Tiers
            <input id="dotaTiersInput" type="text" placeholder="1,2,3,4" value="1,2,3,4" />
          </label>
          <label>
            Date From
            <input id="dateFromInput" type="datetime-local" />
          </label>
          <label>
            Date To
            <input id="dateToInput" type="datetime-local" />
          </label>
        </div>

        <div class="actions">
          <button id="refreshButton" type="button">Refresh</button>
          <button id="saveButton" type="button" class="ghost">Save API Base</button>
          <p id="statusText" class="status-text">Ready.</p>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>Schedule</h2>
          <p id="scheduleMeta" class="meta-text">Waiting for data...</p>
        </div>
        <div id="scheduleTableWrap" class="table-wrap"></div>

        <div class="section-head top-space">
          <h2>Results</h2>
          <p id="resultsMeta" class="meta-text">Waiting for data...</p>
        </div>
        <div id="resultsTableWrap" class="table-wrap"></div>
      </section>
    </main>

    <script src="./site-config.js"></script>
    <script type="module" src="./schedule.js"></script>
  </body>
</html>
