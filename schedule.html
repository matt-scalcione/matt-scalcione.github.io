<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pulseboard Schedule & Results</title>
    <meta
      name="description"
      content="Upcoming schedule and final results for League of Legends and Dota 2 with quick access to series and game detail."
    />
    <meta name="robots" content="index,follow" />
    <link rel="canonical" href="https://matt-scalcione.github.io/schedule.html" />
    <meta property="og:site_name" content="Pulseboard" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pulseboard Schedule & Results" />
    <meta
      property="og:description"
      content="Upcoming schedule and final results for League of Legends and Dota 2 with quick series access."
    />
    <meta property="og:url" content="https://matt-scalcione.github.io/schedule.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pulseboard Schedule & Results" />
    <meta
      name="twitter:description"
      content="Upcoming schedule and final results for League of Legends and Dota 2 with quick series access."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Fraunces:opsz,wght@9..144,400;9..144,600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260313f" />
  </head>
  <body class="product-shell schedule-page">
    <div class="noise"></div>
    <header class="site-header">
      <div class="site-header-row">
        <a href="./index.html" class="site-brand" aria-label="Pulseboard home">
          <span class="site-brand-mark" aria-hidden="true">PB</span>
          <span class="site-brand-copy">
            <span class="site-brand-name">Pulseboard</span>
            <span class="site-brand-tag">Pro scores</span>
          </span>
        </a>
        <div class="site-header-utility" aria-hidden="true">
          <span class="site-header-utility-pill">Live esports board</span>
        </div>
      </div>
      <nav class="site-header-nav" aria-label="Primary">
        <a id="liveDeskNav" href="./index.html">Live</a>
        <a id="scheduleNav" href="./schedule.html" aria-current="page">Schedule</a>
        <a id="followsNav" href="./follows.html">Follows</a>
        <a id="lolHubNav" href="./lol.html">LoL</a>
        <a id="dotaHubNav" href="./dota2.html">Dota 2</a>
      </nav>
    </header>
    <header class="hero schedule-filter-hero">
      <div class="schedule-filter-shell is-collapsed">
        <div class="schedule-filter-toolbar">
          <label class="schedule-filter-inline-search">
            <span class="sr-only">Search schedule and results</span>
            <input id="slateSearchInput" type="search" placeholder="Search teams or events" />
          </label>
          <button
            id="scheduleFilterToggle"
            type="button"
            class="schedule-filter-toggle"
            aria-expanded="false"
            aria-controls="scheduleFilterBody"
          >
            <span id="scheduleFilterSummary" class="schedule-filter-toggle-summary">All games · Live</span>
            <span class="schedule-filter-toggle-icon" aria-hidden="true"></span>
          </button>
          <p id="statusText" class="status-text schedule-filter-status" aria-live="polite">Ready.</p>
        </div>
        <div class="schedule-primary-toolbar" role="group" aria-label="Upcoming and results view">
          <button type="button" class="schedule-primary-button" data-primary-view="schedule">Upcoming</button>
          <button type="button" class="schedule-primary-button" data-primary-view="results">Results</button>
          <button type="button" class="schedule-primary-button active" data-primary-view="both">All</button>
        </div>
        <div id="scheduleFilterBody" class="schedule-filter-body">
          <div class="schedule-filter-grid">
            <section class="schedule-filter-segment schedule-filter-segment-game" aria-label="Game filter">
              <span class="schedule-filter-label">Game</span>
              <div class="schedule-filter-chip-row schedule-filter-game-row" role="group" aria-label="Game">
                <button type="button" class="schedule-filter-chip active" data-game="">All</button>
                <button type="button" class="schedule-filter-chip" data-game="lol">LoL</button>
                <button type="button" class="schedule-filter-chip" data-game="dota2">Dota 2</button>
              </div>
            </section>
            <section class="schedule-filter-segment schedule-filter-segment-group" aria-label="Group by filter">
              <span class="schedule-filter-label">Group by</span>
              <div class="schedule-filter-chip-row schedule-filter-group-row" role="group" aria-label="Group by">
                <button type="button" class="schedule-filter-chip active" data-group="tournament">Tournament</button>
                <button type="button" class="schedule-filter-chip" data-group="date">Date</button>
              </div>
            </section>
            <label class="schedule-filter-field schedule-filter-field-game schedule-filter-field-select">
              <span class="schedule-filter-label">Game</span>
              <select id="gameSelect">
                <option value="">All games</option>
                <option value="lol">League of Legends</option>
                <option value="dota2">Dota 2</option>
              </select>
            </label>
            <label class="schedule-filter-field schedule-filter-field-group schedule-filter-field-select">
              <span class="schedule-filter-label">Group by</span>
              <select id="groupBySelect">
                <option value="tournament">Tournament</option>
                <option value="date">Date</option>
              </select>
            </label>
            <section class="schedule-filter-window" aria-label="Date range">
              <div class="schedule-filter-window-head">
                <span class="schedule-filter-label">Date range</span>
                <div id="scheduleRangePresets" class="schedule-range-row" role="group" aria-label="Quick date ranges">
                  <button type="button" class="schedule-range-chip" data-range="live">Live</button>
                  <button type="button" class="schedule-range-chip" data-range="24h">24h</button>
                  <button type="button" class="schedule-range-chip" data-range="3d">3d</button>
                  <button type="button" class="schedule-range-chip" data-range="7d">7d</button>
                  <button
                    id="scheduleCustomDatesToggle"
                    type="button"
                    class="schedule-range-chip schedule-custom-range-chip"
                    aria-expanded="false"
                    aria-controls="scheduleCustomDates"
                  >
                    Custom
                  </button>
                </div>
              </div>
              <div id="scheduleCustomDates" class="schedule-filter-date-grid">
                <label class="schedule-filter-field">
                  <span class="schedule-filter-label">From</span>
                  <input id="dateFromInput" type="datetime-local" />
                </label>
                <label class="schedule-filter-field">
                  <span class="schedule-filter-label">To</span>
                  <input id="dateToInput" type="datetime-local" />
                </label>
              </div>
            </section>
          </div>
        </div>
        <input id="apiBaseInput" type="hidden" />
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <div id="scheduleSection">
          <div class="section-head">
            <h2 id="scheduleSectionTitle">Upcoming</h2>
            <p id="scheduleMeta" class="meta-text" aria-live="polite">Waiting for data...</p>
          </div>
          <div id="scheduleTableWrap" class="table-wrap"></div>
        </div>

        <div id="resultsSection" class="top-space">
          <div class="section-head">
            <h2 id="resultsSectionTitle">Results</h2>
            <p id="resultsMeta" class="meta-text" aria-live="polite">Waiting for data...</p>
          </div>
          <div id="resultsTableWrap" class="table-wrap"></div>
        </div>
      </section>
    </main>

    <nav class="mobile-tabbar" aria-label="Primary">
      <a id="mobileLiveNav" class="mobile-tab" href="./index.html">
        <span class="mobile-tab-icon">L</span>
        <span>Live</span>
      </a>
      <a id="mobileScheduleNav" class="mobile-tab" href="./schedule.html" aria-current="page">
        <span class="mobile-tab-icon">S</span>
        <span>Schedule</span>
      </a>
      <a id="mobileFollowsNav" class="mobile-tab" href="./follows.html">
        <span class="mobile-tab-icon">F</span>
        <span>Follows</span>
      </a>
    </nav>

    <script src="./site-config.js?v=20260309c"></script>
    <script src="./site-header.js?v=20260312b"></script>
    <script type="module" src="./schedule.js?v=20260313c"></script>
  </body>
</html>
